<div class="app-container">
  <header class="glass-header">
    <div class="logo">
      <span class="icon">✈️</span>
      <h1>TravelAI Engine</h1>
    </div>
    <div class="search-section">
      <div class="input-row main-input">
        <input 
          type="text" 
          [(ngModel)]="destination" 
          placeholder="Where to next? (e.g. Tokyo, Jaipur...)"
          (keyup.enter)="generatePlan()"
        >
      </div>
      <div class="input-row controls">
        <div class="input-group">
          <label>Days</label>
          <input type="number" [(ngModel)]="numDays" min="1" max="10" style="width: 60px;">
        </div>
        <div class="input-group">
          <label>Interests</label>
          <input type="text" [(ngModel)]="interests" placeholder="Food, Art, Nature..." style="width: 250px;">
        </div>
        <button (click)="generatePlan()" [disabled]="loading" class="magic-btn">
          <span *ngIf="!loading">✨ Plan My Trip</span>
          <span *ngIf="loading" class="loader"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="content">
    <div class="itinerary-panel" [class.active]="itinerary">
      <div *ngIf="!itinerary && !loading" class="empty-state">
        <p>Your AI-powered adventure starts here.</p>
        <small>Enter a destination above to generate a custom itinerary.</small>
      </div>

      <div *ngIf="loading" class="loading-state">
        <div class="pulse-loader"></div>
        <p>Consulting with Gemini...</p>
      </div>

      <div *ngIf="itinerary" class="itinerary-content">
        <h2>{{ itinerary.destination }}</h2>
        <div *ngFor="let day of itinerary.itinerary" class="day-card">
          <h3>Day {{ day.day }}</h3>
          <div *ngFor="let activity of day.activities" class="activity-item">
            <div class="activity-dot"></div>
            <div class="activity-details">
              <strong>{{ activity.name }}</strong>
              <p>{{ activity.description }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="map-wrapper">
      <div #mapContainer id="map" aria-label="Interactive Travel Map"></div>
    </div>
  </main>
</div>
